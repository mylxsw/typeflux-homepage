<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>Typeflux — Voice Assistant for macOS</title>
  <meta name="description"
    content="Typeflux is an open-source, free macOS voice assistant. Features fast voice input, local AI models, and deep privacy protection." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://github.com/mylxsw/typeflux" />
  <meta property="og:title" content="Typeflux — Voice Assistant for macOS" />
  <meta property="og:description"
    content="Typeflux is an open-source, free macOS voice assistant. Features fast voice input, local AI models, and deep privacy protection." />
  <meta property="og:image" content="/social-card.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Typeflux — Voice Assistant for macOS" />
  <meta name="twitter:description"
    content="Typeflux is an open-source, free macOS voice assistant. Features fast voice input, local AI models, and deep privacy protection." />
  <meta name="twitter:image" content="/social-card.png" />
  <link href="/fonts/fonts.css" rel="stylesheet" />
  <script>
    // Initialize theme before page renders to prevent flash
    (function () {
      const savedTheme = localStorage.getItem('typeflux-theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
